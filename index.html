                    ctx.fill();
                    /*
                        fill(): preenche a forma com fillStyle.
                    */

                    ctx.strokeStyle = '#fff';
                    /*
                        Cor da borda: branco.
                    */

                    ctx.lineWidth = 3;
                    /*
                        Espessura da borda.
                    */

                    ctx.stroke();
                    /*
                        Desenha a borda do círculo.
                    */

                    // Valor do IMC no centro
                    /*
                        Comentário: exibe o valor numérico no canvas.
                    */

                    ctx.fillStyle = '#f1f5f9';
                    /*
                        Cor do texto: cinza claro.
                    */

                    ctx.font = 'bold 28px Inter, sans-serif';
                    /*
                        Define a fonte do texto.
                        'bold': peso negrito.
                        '28px': tamanho da fonte.
                        'Inter, sans-serif': família da fonte.
                    */

                    ctx.textAlign = 'center';
                    /*
                        Alinhamento horizontal do texto.
                        'center': centralizado no ponto de referência.
                    */

                    ctx.textBaseline = 'middle';
                    /*
                        Alinhamento vertical do texto.
                        'middle': centralizado verticalmente.
                    */

                    ctx.fillText(imc.toFixed(1), cx, cy - 40);
                    /*
                        fillText(texto, x, y): desenha texto preenchido.
                        imc.toFixed(1): formata IMC com 1 casa decimal.
                        cx: coordenada X (centro).
                        cy - 40: coordenada Y (40px acima do centro).
                    */

                    ctx.font = '14px Inter, sans-serif';
                    /*
                        Fonte menor para o label "IMC".
                    */

                    ctx.fillStyle = '#94a3b8';
                    /*
                        Cor cinza para o label.
                    */

                    ctx.fillText('IMC', cx, cy + 30);
                    /*
                        Desenha "IMC" 30px abaixo do centro.
                    */
                } else {
                    /*
                        else: executado se a condição do if for falsa.
                        Aqui: quando não há IMC válido.
                    */

                    // Caso não haja IMC, mostra "--"
                    /*
                        Comentário: estado inicial ou sem dados.
                    */

                    ctx.fillStyle = '#94a3b8';
                    /*
                        Cor cinza.
                    */

                    ctx.font = 'bold 32px Inter, sans-serif';
                    /*
                        Fonte grande para "--".
                    */

                    ctx.textAlign = 'center';
                    /*
                        Texto centralizado.
                    */

                    ctx.textBaseline = 'middle';
                    /*
                        Alinhamento vertical ao meio.
                    */

                    ctx.fillText('--', cx, cy - 10);
                    /*
                        Desenha "--" (sem valor).
                    */

                    ctx.font = '14px Inter, sans-serif';
                    /*
                        Fonte menor para label.
                    */

                    ctx.fillText('IMC', cx, cy + 40);
                    /*
                        Desenha "IMC" abaixo.
                    */
                }

                // ---- Pequenas marcas de referência (10 divisões) ----
                /*
                    Comentário: desenha marcas (ticks) ao redor do arco.
                */

                for (let i = 0; i <= 10; i++) {
                    /*
                        Loop for: repete 11 vezes (0 a 10).
                        let: declara variável com escopo de bloco.
                        i = 0: inicialização.
                        i <= 10: condição de continuação.
                        i++: incremento (i = i + 1).
                    */

                    const frac = i / 10;
                    /*
                        Fração da posição atual.
                        i=0 → 0, i=5 → 0.5, i=10 → 1.
                    */

                    const ang = anguloInicio + frac * (anguloFim - anguloInicio);
                    /*
                        Calcula o ângulo correspondente à fração.
                    */

                    const r1 = raio - 6;
                    /*
                        Raio interno da marca (mais perto do centro).
                    */

                    const r2 = raio + 10;
                    /*
                        Raio externo da marca (mais longe do centro).
                    */

                    const x1 = cx + r1 * Math.cos(ang);
                    /*
                        Coordenada X do ponto interno.
                    */

                    const y1 = cy + r1 * Math.sin(ang);
                    /*
                        Coordenada Y do ponto interno.
                    */

                    const x2 = cx + r2 * Math.cos(ang);
                    /*
                        Coordenada X do ponto externo.
                    */

                    const y2 = cy + r2 * Math.sin(ang);
                    /*
                        Coordenada Y do ponto externo.
                    */

                    ctx.beginPath();
                    /*
                        Inicia novo caminho para a marca.
                    */

                    ctx.moveTo(x1, y1);
                    /*
                        Move para o ponto interno.
                    */

                    ctx.lineTo(x2, y2);
                    /*
                        Linha até o ponto externo.
                    */

                    ctx.strokeStyle = '#94a3b8';
                    /*
                        Cor cinza para as marcas.
                    */

                    ctx.lineWidth = 2;
                    /*
                        Espessura fina.
                    */

                    ctx.stroke();
                    /*
                        Desenha a marca.
                    */
                }
            }

            // ============================================================
            // 4. ATUALIZAR RESULTADO (texto e medidor)
            //    Recebe os parâmetros do cálculo e atualiza a interface.
            // ============================================================
            /*
                Comentário de seção: função que atualiza a UI com os resultados.
            */

            function atualizarResultado(peso, altura, imc, classificacao, risco, recomendacao) {
                /*
                    Função com múltiplos parâmetros.
                    peso, altura: valores inseridos.
                    imc: resultado calculado.
                    classificacao: categoria do IMC.
                    risco: nível de risco à saúde.
                    recomendacao: dica personalizada.
                */

                // Desenha o medidor com o IMC
                /*
                    Comentário.
                */

                desenharMedidor(imc);
                /*
                    Chama a função de desenho passando o IMC.
                */

                // Atualiza os elementos de texto
                /*
                    Comentário.
                */

                const imcNum = document.querySelector('.imc-num');
                /*
                    querySelector(seletor): busca o primeiro elemento que corresponde.
                    '.imc-num': seletor CSS de classe.
                    Similar a getElementById, mas aceita qualquer seletor CSS.
                */

                const classifSpan = document.querySelector('.classif');
                /*
                    Referência ao span da classificação.
                */

                const riscoSpan = document.querySelector('.risco');
                /*
                    Referência ao span do risco.
                */

                const recoDiv = document.querySelector('.recomendacao');
                /*
                    Referência ao div da recomendação.
                */

                if (imc !== null && !isNaN(imc)) {
                    /*
                        Se IMC é válido.
                    */

                    imcNum.textContent = imc.toFixed(2);
                    /*
                        textContent: define o texto do elemento.
                        imc.toFixed(2): formata com 2 casas decimais.
                    */

                    classifSpan.textContent = classificacao;
                    /*
                        Exibe a classificação.
                    */

                    riscoSpan.textContent = `Risco: ${risco}`;
                    /*
                        Template literal (crase): permite interpolação.
                        ${risco}: insere o valor da variável risco.
                    */

                    recoDiv.innerHTML = `<i class="fas fa-lightbulb"></i> ${recomendacao}`;
                    /*
                        innerHTML: define o HTML interno (não apenas texto).
                        Permite inserir o ícone junto com o texto.
                    */
                } else {
                    /*
                        Se IMC não é válido.
                    */

                    imcNum.textContent = '--';
                    /*
                        Placeholder.
                    */

                    classifSpan.textContent = 'Aguardando dados';
                    /*
                        Mensagem padrão.
                    */

                    riscoSpan.textContent = '';
                    /*
                        Limpa o risco.
                    */

                    recoDiv.innerHTML = '<i class="fas fa-lightbulb"></i> Insira peso e altura';
                    /*
                        Instrução inicial.
                    */
                }
            }

            // ============================================================
            // 5. FUNÇÃO PRINCIPAL DE CÁLCULO
            // ============================================================
            /*
                Comentário de seção: lógica principal do cálculo de IMC.
            */

            function calcularIMC() {
                /*
                    Função que executa o cálculo e atualiza tudo.
                */

                const peso = parseFloat(pesoInput.value);
                /*
                    parseFloat(): converte string para número decimal.
                    pesoInput.value: texto digitado no campo peso.
                */

                const altura = parseFloat(alturaInput.value);
                /*
                    Converte altura para número.
                */

                // Validação: valores positivos e numéricos
                /*
                    Comentário sobre validação.
                */

                if (isNaN(peso) || isNaN(altura) || peso <= 0 || altura <= 0) {
                    /*
                        Condições de erro (qualquer uma verdadeira):
                        isNaN(peso): peso não é número (campo vazio, letras, etc.).
                        isNaN(altura): altura não é número.
                        peso <= 0: peso é zero ou negativo.
                        altura <= 0: altura é zero ou negativa.
                        ||: operador OR (qualquer condição verdadeira basta).
                    */

                    // Exibe mensagem de erro no medidor (imc = null)
                    /*
                        Comentário.
                    */

                    desenharMedidor(null);
                    /*
                        Redesenha medidor sem ponteiro.
                    */

                    const imcNum = document.querySelector('.imc-num');
                    const classifSpan = document.querySelector('.classif');
                    const riscoSpan = document.querySelector('.risco');
                    const recoDiv = document.querySelector('.recomendacao');
                    /*
                        Obtém referências aos elementos de resultado.
                    */

                    imcNum.textContent = '❌';
                    /*
                        Emoji de erro.
                    */

                    classifSpan.textContent = 'Valores inválidos';
                    /*
                        Mensagem de erro.
                    */

                    riscoSpan.textContent = '';
                    /*
                        Limpa risco.
                    */

                    recoDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Use números positivos';
                    /*
                        Instrução corretiva.
                    */

                    return;
                    /*
                        return: sai da função imediatamente.
                        Não executa o código abaixo.
                    */
                }

                // Cálculo do IMC
                /*
                    Comentário.
                */

                const imc = peso / (altura * altura);
                /*
                    Fórmula do IMC: peso (kg) dividido por altura (m) ao quadrado.
                    altura * altura: altura elevada ao quadrado.
                */

                // Determinação da classificação, risco e recomendação
                /*
                    Comentário.
                */

                let classificacao, risco, recomendacao;
                /*
                    let: declara variáveis que serão atribuídas depois.
                    Diferente de const, let permite reatribuição.
                */

                if (imc < 18.5) {
                    /*
                        IMC abaixo de 18.5: baixo peso.
                    */

                    classificacao = 'Abaixo do peso';
                    /*
                        Atribui a classificação.
                    */

                    risco = 'Baixo';
                    /*
                        Risco à saúde.
                    */

                    recomendacao = `Ganhe ${(18.5 * (altura ** 2) - peso).toFixed(1)} kg para atingir o normal. Consulte um nutricionista.`;
                    /*
                        Template literal com cálculo:
                        altura ** 2: operador de exponenciação (altura ao quadrado).
                        18.5 * (altura ** 2): peso mínimo para IMC 18.5.
                        - peso: diferença em relação ao peso atual.
                        .toFixed(1): formata com 1 casa decimal.
                    */
                } else if (imc < 25) {
                    /*
                        else if: condição alternativa.
                        IMC entre 18.5 e 24.99: peso normal.
                    */

                    classificacao = 'Peso normal';
                    risco = 'Mínimo';
                    recomendacao = 'Parabéns! Mantenha hábitos saudáveis.';
                } else if (imc < 30) {
                    /*
                        IMC entre 25 e 29.99: sobrepeso.
                    */

                    classificacao = 'Sobrepeso';
                    risco = 'Elevado';
                    recomendacao = `Perda sugerida: ${(peso - 24.9 * (altura ** 2)).toFixed(1)} kg. Atividade física e reeducação alimentar.`;
                    /*
                        Cálculo inverso: peso atual menos peso máximo para IMC 24.9.
                    */
                } else if (imc < 35) {
                    /*
                        IMC entre 30 e 34.99: obesidade grau I.
                    */

                    classificacao = 'Obesidade grau I';
                    risco = 'Médio';
                    recomendacao = `Procure orientação. Perder ${(peso - 24.9 * (altura ** 2)).toFixed(1)} kg já ajuda. Consulte médico.`;
                } else if (imc < 40) {
                    /*
                        IMC entre 35 e 39.99: obesidade grau II.
                    */

                    classificacao = 'Obesidade grau II (severa)';
                    risco = 'Alto';
                    recomendacao = 'Busque acompanhamento médico urgente.';
                } else {
                    /*
                        else: captura todos os outros casos.
                        IMC >= 40: obesidade grau III.
                    */

                    classificacao = 'Obesidade grau III (mórbida)';
                    risco = 'Muito alto';
                    recomendacao = 'Procure um especialista imediatamente.';
                }

                // Atualiza a interface com o resultado
                /*
                    Comentário.
                */

                atualizarResultado(peso, altura, imc, classificacao, risco, recomendacao);
                /*
                    Chama a função que atualiza medidor e textos.
                */

                // ===== SALVA NO HISTÓRICO =====
                /*
                    Comentário.
                */

                const historico = getHistorico();
                /*
                    Recupera o histórico atual.
                */

                historico.push({
                    /*
                        push(): adiciona elemento ao final do array.
                        {}: objeto literal com os dados do registro.
                    */

                    data: new Date().toLocaleString(),
                    /*
                        new Date(): cria objeto com data/hora atual.
                        toLocaleString(): formata para string legível local.
                    */

                    peso: peso,
                    /*
                        Armazena o peso.
                        Sintaxe abreviada: se chave = variável, pode usar só peso.
                    */

                    altura: altura,
                    /*
                        Armazena a altura.
                    */

                    imc: parseFloat(imc.toFixed(2)),
                    /*
                        Armazena IMC com 2 casas decimais.
                        parseFloat converte de volta para número.
                    */

                    classificacao: classificacao,
                    /*
                        Armazena a classificação.
                    */

                    risco: risco
                    /*
                        Armazena o risco.
                    */
                });

                // Limita a 50 registros para não sobrecarregar o localStorage
                /*
                    Comentário.
                */

                if (historico.length > 50) historico.shift();
                /*
                    Condição sem chaves (sintaxe curta para uma linha).
                    historico.length: quantidade de elementos no array.
                    shift(): remove o primeiro elemento do array (mais antigo).
                */

                saveHistorico(historico);
                /*
                    Salva o histórico atualizado.
                */

                // Renderiza novamente o histórico (barras e tabela)
                /*
                    Comentário.
                */

                renderizarHistorico();
                /*
                    Atualiza a exibição do histórico.
                */
            }

            // ============================================================
            // 6. RENDERIZAÇÃO DO HISTÓRICO (barras + tabela)
            // ============================================================
            /*
                Comentário de seção: função que exibe o histórico visual.
            */

            function renderizarHistorico() {
                /*
                    Função que gera barras e tabela do histórico.
                */

                const historico = getHistorico();
                /*
                    Obtém dados salvos.
                */

                // ---- GRÁFICO DE BARRAS ----
                /*
                    Comentário.
                */

                barrasContainer.innerHTML = '';
                /*
                    Limpa o container (remove barras antigas).
                */

                if (historico.length === 0) {
                    /*
                        Se não há histórico.
                    */

                    barrasContainer.innerHTML = '<div class="historico-vazio">Nenhum registro ainda</div>';
                    /*
                        Exibe mensagem.
                    */
                } else {
                    /*
                        Se há histórico.
                    */

                    // Pega os últimos 15 registros
                    /*
                        Comentário.
                    */

                    const ultimos = historico.slice(-15);
                    /*
                        slice(inicio, fim): extrai parte do array.
                        -15: últimos 15 elementos.
                        Número negativo conta do final.
                    */

                    const maxIMC = Math.max(...ultimos.map(r => r.imc), 30);
                    /*
                        Encontra o maior IMC para escalar as barras.
                        
                        ultimos.map(r => r.imc):
                            map(): transforma array, aplicando função a cada elemento.
                            r => r.imc: arrow function que extrai o IMC de cada registro.
                            Resultado: array com apenas os valores de IMC.
                        
                        ...ultimos.map(...): spread operator.
                            "Espalha" o array como argumentos individuais.
                        
                        Math.max(...array, 30):
                            Retorna o maior valor entre todos IMCs e 30.
                            30 é o mínimo para escala (evita barras muito altas com IMCs baixos).
                    */

                    const alturaMax = 100;
                    /*
                        Altura máxima das barras em pixels.
                    */

                    ultimos.forEach((reg) => {
                        /*
                            forEach(): executa função para cada elemento do array.
                            reg: parâmetro representando cada registro.
                            Arrow function: (parâmetro) => { código }
                        */

                        const div = document.createElement('div');
                        /*
                            createElement('tag'): cria um novo elemento HTML.
                            'div': tipo do elemento.
                            O elemento existe apenas em memória até ser adicionado ao DOM.
                        */

                        div.className = 'barra-item';
                        /*
                            className: define a classe CSS do elemento.
                        */

                        const barra = document.createElement('div');
                        /*
                            Cria a barra propriamente dita.
                        */

                        barra.className = 'barra';
                        /*
                            Classe da barra.
                        */

                        const alturaBarra = (reg.imc / maxIMC) * alturaMax;
                        /*
                            Calcula altura proporcional.
                            reg.imc / maxIMC: proporção do IMC em relação ao máximo.
                            * alturaMax: converte para pixels.
                        */

                        barra.style.height = Math.max(4, alturaBarra) + 'px';
                        /*
                            style.height: define altura via CSS inline.
                            Math.max(4, alturaBarra): garante mínimo de 4px.
                            + 'px': concatena unidade.
                        */

                        // Cor baseada no IMC
                        /*
                            Comentário.
                        */

                        let cor;
                        /*
                            Variável para armazenar a cor.
                        */

                        if (reg.imc < 18.5) cor = '#facc15';
                        /*
                            Baixo peso: amarelo.
                        */

                        else if (reg.imc < 25) cor = '#22c55e';
                        /*
                            Normal: verde.
                        */

                        else if (reg.imc < 30) cor = '#f97316';
                        /*
                            Sobrepeso: laranja.
                        */

                        else cor = '#ef4444';
                        /*
                            Obesidade: vermelho.
                        */

                        barra.style.background = cor;
                        /*
                            Define a cor de fundo da barra.
                        */

                        const label = document.createElement('span');
                        /*
                            Cria o label com valor do IMC.
                        */

                        label.className = 'label';
                        /*
                            Classe do label.
                        */

                        label.textContent = reg.imc.toFixed(1);
                        /*
                            Define o texto (IMC com 1 decimal).
                        */

                        div.appendChild(barra);
                        /*
                            appendChild(): adiciona elemento filho.
                            Adiciona a barra dentro do div.barra-item.
                        */

                        div.appendChild(label);
                        /*
                            Adiciona o label abaixo da barra.
                        */

                        barrasContainer.appendChild(div);
                        /*
                            Adiciona o item completo ao container.
                        */
                    });
                }

                // ---- TABELA DE HISTÓRICO ----
                /*
                    Comentário.
                */

                const tbody = corpoTabela;
                /*
                    Referência ao tbody da tabela.
                */

                tbody.innerHTML = '';
                /*
                    Limpa conteúdo anterior.
                */

                if (historico.length === 0) {
                    /*
                        Se não há histórico.
                    */

                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-secondary);">Nenhum registro</td></tr>';
                    /*
                        Linha única com mensagem.
                    */
                } else {
                    /*
                        Se há histórico.
                    */

                    // Mostra os últimos 10 (do mais recente para o mais antigo)
                    /*
                        Comentário.
                    */

                    const recentes = historico.slice(-10).reverse();
                    /*
                        slice(-10): últimos 10 registros.
                        reverse(): inverte a ordem (mais recente primeiro).
                        reverse() modifica o array, mas slice() já criou uma cópia.
                    */

                    recentes.forEach((reg, idx) => {
                        /*
                            forEach com dois parâmetros:
                            reg: o elemento atual.
                            idx: índice (posição) atual.
                        */

                        const tr = document.createElement('tr');
                        /*
                            Cria uma linha de tabela.
                        */

                        tr.innerHTML = `
                            <td>${idx + 1}</td>
                            <td>${reg.data}</td>
                            <td>${reg.peso.toFixed(1)}</td>
                            <td>${reg.altura.toFixed(2)}</td>
                            <td>${reg.imc.toFixed(2)}</td>
                            <td>${reg.classificacao}</td>
                        `;
                        /*
                            Template literal multilinha.
                            Define o HTML interno da linha com células.
                            ${idx + 1}: número da linha (1-based).
                            ${reg.data}: data do registro.
                            ${reg.peso.toFixed(1)}: peso formatado.
                            ${reg.altura.toFixed(2)}: altura formatada.
                            ${reg.imc.toFixed(2)}: IMC formatado.
                            ${reg.classificacao}: classificação.
                        */

                        tbody.appendChild(tr);
                        /*
                            Adiciona a linha ao corpo da tabela.
                        */
                    });
                }
            }

            // ============================================================
            // 7. LIMPAR HISTÓRICO
            // ============================================================
            /*
                Comentário de seção.
            */

            function limparHistorico() {
                /*
                    Função para apagar todo o histórico.
                */

                if (confirm('Apagar todo o histórico?')) {
                    /*
                        confirm(): exibe caixa de diálogo com OK/Cancelar.
                        Retorna true se usuário clicou OK.
                    */

                    saveHistorico([]);
                    /*
                        Salva array vazio (apaga tudo).
                    */

                    renderizarHistorico();
                    /*
                        Atualiza a exibição.
                    */

                    // Reseta o medidor e o texto
                    /*
                        Comentário.
                    */

                    desenharMedidor(null);
                    /*
                        Medidor sem ponteiro.
                    */

                    const imcNum = document.querySelector('.imc-num');
                    const classifSpan = document.querySelector('.classif');
                    const riscoSpan = document.querySelector('.risco');
                    const recoDiv = document.querySelector('.recomendacao');
                    /*
                        Referências aos elementos.
                    */

                    imcNum.textContent = '--';
                    /*
                        Reseta valor.
                    */

                    classifSpan.textContent = 'Histórico limpo';
                    /*
                        Mensagem de confirmação.
                    */

                    riscoSpan.textContent = '';
                    /*
                        Limpa risco.
                    */

                    recoDiv.innerHTML = '<i class="fas fa-undo"></i> Recalcule para ver resultados';
                    /*
                        Instrução.
                    */
                }
            }

            // ============================================================
            // 8. TEMA CLARO/ESCURO (alternância via CSS custom properties)
            // ============================================================
            /*
                Comentário de seção.
            */

            function toggleTheme() {
                /*
                    Função que alterna entre tema claro e escuro.
                */

                const root = document.documentElement;
                /*
                    documentElement: referência ao elemento <html>.
                    É onde as variáveis CSS foram definidas (:root).
                */

                const atual = getComputedStyle(root).getPropertyValue('--bg').trim();
                /*
                    getComputedStyle(elemento): obtém estilos computados.
                    getPropertyValue('--bg'): obtém valor da variável CSS.
                    trim(): remove espaços em branco das pontas.
                */

                if (atual === '#0b1120') {
                    /*
                        Se cor de fundo é a do tema escuro.
                    */

                    // Tema claro
                    /*
                        Comentário.
                    */

                    root.style.setProperty('--bg', '#f1f5f9');
                    /*
                        style.setProperty('variável', 'valor'): altera variável CSS.
                        Muda fundo para cinza claro.
                    */

                    root.style.setProperty('--card-bg', '#ffffff');
                    /*
                        Cards brancos.
                    */

                    root.style.setProperty('--text', '#0b1120');
                    /*
                        Texto escuro.
                    */

                    root.style.setProperty('--text-secondary', '#475569');
                    /*
                        Texto secundário mais escuro.
                    */

                    root.style.setProperty('--border', '#cbd5e1');
                    /*
                        Bordas mais claras.
                    */

                    themeToggle.innerHTML = '<i class="fas fa-sun"></i> Claro';
                    /*
                        Muda ícone para sol e texto para "Claro".
                    */
                } else {
                    /*
                        Senão, está no tema claro.
                    */

                    // Tema escuro
                    /*
                        Comentário.
                    */

                    root.style.setProperty('--bg', '#0b1120');
                    /*
                        Restaura fundo escuro.
                    */

                    root.style.setProperty('--card-bg', '#1a2332');
                    /*
                        Cards escuros.
                    */

                    root.style.setProperty('--text', '#f1f5f9');
                    /*
                        Texto claro.
                    */

                    root.style.setProperty('--text-secondary', '#94a3b8');
                    /*
                        Texto secundário.
                    */

                    root.style.setProperty('--border', '#2d3a4f');
                    /*
                        Bordas escuras.
                    */

                    themeToggle.innerHTML = '<i class="fas fa-moon"></i> Tema';
                    /*
                        Muda ícone para lua e texto para "Tema".
                    */
                }
            }

            // ============================================================
            // 9. INICIALIZAÇÃO E EVENTOS
            // ============================================================
            /*
                Comentário de seção.
            */

            function init() {
                /*
                    Função de inicialização.
                    Configura o estado inicial da aplicação.
                */

                desenharMedidor(null);
                /*
                    Desenha medidor inicial sem valor.
                */

                renderizarHistorico();
                /*
                    Renderiza histórico existente (do localStorage).
                */

                calcularBtn.addEventListener('click', calcularIMC);
                /*
                    addEventListener('evento', função): registra um ouvinte de evento.
                    'click': tipo de evento (clique do mouse).
                    calcularIMC: função a ser chamada quando o evento ocorrer.
                    Quando o botão for clicado, calcularIMC() é executada.
                */

                pesoInput.addEventListener('keypress', (e) => {
                    /*
                        Ouvinte de evento 'keypress': quando tecla é pressionada.
                        (e) => {...}: arrow function com parâmetro e (evento).
                        O objeto evento contém informações sobre a tecla pressionada.
                    */

                    if (e.key === 'Enter') calcularIMC();
                    /*
                        e.key: a tecla pressionada.
                        'Enter': tecla Enter.
                        Se Enter for pressionado, calcula o IMC.
                    */
                });

                alturaInput.addEventListener('keypress', (e) => {
                    /*
                        Mesmo comportamento para o input de altura.
                    */

                    if (e.key === 'Enter') calcularIMC();
                    /*
                        Enter no campo altura também calcula.
                    */
                });

                limparBtn.addEventListener('click', limparHistorico);
                /*
                    Clique no botão limpar chama limparHistorico().
                */

                themeToggle.addEventListener('click', toggleTheme);
                /*
                    Clique no botão de tema chama toggleTheme().
                */
            }

            init();
            /*
                Chama a função de inicialização.
                Executa quando o script é carregado.
            */

        })();
        /*
            })(): fim da IIFE (Immediately Invoked Function Expression).
            Os parênteses finais () executam a função imediatamente.
        */

        // Fim da IIFE
        /*
            Comentário indicando o fim do script.
        */
    </script>
    <!-- 
        Fim da tag </script>: encerra o bloco JavaScript.
    -->

</body>
